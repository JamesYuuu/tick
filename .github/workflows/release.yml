name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            pack: tar
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
            pack: tar
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            pack: tar
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            pack: tar
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            pack: zip
          - runner: windows-latest
            goos: windows
            goarch: arm64
            ext: ".exe"
            pack: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test (linux/amd64 only)
        if: ${{ matrix.goos == 'linux' && matrix.goarch == 'amd64' }}
        run: go test ./... -count=1

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -o "dist/tick${{ matrix.ext }}" ./cmd/tick

      - name: Package (tar.gz)
        if: ${{ matrix.pack == 'tar' }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          name="tick-${version}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p out
          tar -C dist -czf "out/${name}.tar.gz" "tick${{ matrix.ext }}"

      - name: Package (zip)
        if: ${{ matrix.pack == 'zip' }}
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $name = "tick-$version-${{ matrix.goos }}-${{ matrix.goarch }}"
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path "dist/tick${{ matrix.ext }}" -DestinationPath "out/$name.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tick-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/*
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip

  update-homebrew-tap:
    name: update homebrew tap
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Dispatch formula update
        env:
          DISPATCH_TOKEN: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          version="${TAG#v}"
          tarball_url="https://github.com/${REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"

          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/JamesYuuu/homebrew-tap/dispatches \
            -d "$(cat <<EOF
          {
            "event_type": "update-formula",
            "client_payload": {
              "formula": "tick",
              "tag": "${TAG}",
              "version": "${version}",
              "tarball_url": "${tarball_url}"
            }
          }
          EOF
          )"
