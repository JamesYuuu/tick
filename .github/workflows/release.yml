name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build python package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install build

      - name: Run tests
        run: |
          PYTHONPATH=src python -m unittest discover -s tests

      - name: Build distributions
        run: |
          python -m build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tick-${{ github.ref_name }}-python-dist
          path: dist/*
          if-no-files-found: error

  release:
    name: create github release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.whl

  update-homebrew-tap:
    name: update homebrew tap
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - name: Dispatch formula update
        env:
          DISPATCH_TOKEN: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          version="${TAG#v}"
          source_tarball_url="https://github.com/${REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          release_url="https://github.com/${REPOSITORY}/releases/tag/${TAG}"

          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/JamesYuuu/homebrew-tap/dispatches \
            -d "$(cat <<EOF
          {
            "event_type": "update-formula",
            "client_payload": {
              "formula": "tick",
              "tag": "${TAG}",
              "version": "${version}",
              "source_tarball_url": "${source_tarball_url}",
              "release_url": "${release_url}",
              "package_type": "python"
            }
          }
          EOF
          )"
